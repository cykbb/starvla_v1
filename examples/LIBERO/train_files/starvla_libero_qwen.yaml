run_id: starvla
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: bykkk-nanyang-technological-university-singapore
wandb_project: starVLA_Libero
is_debug: false


framework:
  name: QwenPI
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen2.5-VL-3B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
    num_vl_layers: 16
  dino:
    dino_backbone: dinov2_vits14
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 1024     # TODO merge with hidden_size, in config v2
    hidden_size: 1024     
    add_pos_embed: True
    max_seq_len: 1024
    action_dim: 7
    state_dim: 8
    future_action_window_size: 7
    action_horizon: 8 # need merge with future_action_window_size 
    past_action_window_size: 0
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 8
    num_target_vision_tokens: 32
    diffusion_model_cfg:    # DiT Transformers 的参数
      cross_attention_dim: 2048 # VLM 的 dim
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null

  reduce_in_full_precision: true


datasets:
  vlm_data:
    dataset_py: vlm_datasets
    dataformat: llava_json
    dataset_use: sharegpt4v_coco
    eval_dataset: sharegpt4v_coco
    data_flatten: false
    base_interval: 2
    max_pixels: 307200
    min_pixels: 784
    model_max_length: 2048
    model_type: qwen2.5vl
    per_device_batch_size: 4

  vla_data:
    dataset_py: lerobot_datasets
    lerobot_version: v3.0
    data_root_dir: playground/Datasets/LEROBOT_LIBERO_DATA
    data_mix: libero_all # libero_goal
    action_type: delta_qpos
    sequential_step_sampling: False
    #CoT_answer: bbox
    #default_image_resolution: [3, 224, 224]
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 8
    load_all_data_for_training: true
    obs: ["image_0"]
    video_backend: torchvision_av
    include_state: true
    include_segmentation: false
    include_answers: false
    include_seg_patches: false
    spatial_merge_size: 2



trainer:
  epochs: 100
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 5000
  eval_interval: 100
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 4
  repeated_diffusion_steps: 2

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  # parameters to be determined
  is_resume: true
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
